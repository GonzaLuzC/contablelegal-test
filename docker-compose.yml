services:
  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html/cont-leg-test
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # bandeja web; el SMTP (1025) queda en la red interna
